version: "2"

linters:
  enable:
    # Bugs / correctness
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - contextcheck
    - copylock
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - gocritic
    - noctx
    - nilerr
    - nilnil
    - predeclared
    - reassign
    - rowserrcheck
    - sqlclosecheck
    - unparam
    - usestdlibvars
    - wastedassign

    # Style / maintainability
    - gofmt
    - goimports
    - gochecknoglobals
    - godot
    - misspell
    - nakedret
    - nestif
    - nolintlint
    - revive
    - stylecheck
    - unconvert
    - whitespace

    # Performance
    - prealloc

    # Security
    - gosec

    # Complexity
    - cyclop
    - funlen
    - gocognit
    - gocyclo
    - maintidx

linters-settings:
  lll:
    line-length: 120

  funlen:
    lines: 120
    statements: 60

  gocognit:
    min-complexity: 20

  gocyclo:
    min-complexity: 20

  cyclop:
    max-complexity: 20

  nestif:
    min-complexity: 5

  godot:
    scope: declarations

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
      - experimental

  revive:
    rules:
      - name: exported
      - name: var-naming
      - name: error-return
      - name: error-strings
      - name: increment-decrement
      - name: unused-parameter

  gosec:
    excludes:
      - G304  # file path from variable — intentional for an editor

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - funlen
        - gocognit
        - gocyclo
        - cyclop
        - gochecknoglobals

    - path: "internal/lsp/"
      linters:
        - gochecknoglobals

  max-issues-per-linter: 0
  max-same-issues: 0
