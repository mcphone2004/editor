version: "2"

run:
  build-tags:
    - e2e

linters:
  enable:
    # Bugs / correctness
    # (gosimple, copylock, stylecheck removed — merged into staticcheck in v2)
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - contextcheck
    - durationcheck
    - errname
    - errorlint
    - exhaustive
    - gocritic
    - noctx
    - nilerr
    - nilnil
    - predeclared
    - reassign
    - rowserrcheck
    - sqlclosecheck
    - unparam
    - usestdlibvars
    - wastedassign

    # Style / maintainability
    - gochecknoglobals
    - godot
    - misspell
    - nakedret
    - nestif
    - nolintlint
    - revive

    - unconvert
    - whitespace

    # Performance
    - prealloc

    # Security
    - gosec

    # Complexity
    - cyclop
    - funlen
    - gocognit
    - gocyclo
    - maintidx

  settings:
    lll:
      line-length: 120

    funlen:
      lines: 400
      statements: 200

    gocognit:
      min-complexity: 65

    maintidx:
      under: 10

    gocyclo:
      min-complexity: 80

    cyclop:
      max-complexity: 80

    nestif:
      min-complexity: 5

    godot:
      scope: declarations

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
        - experimental

    revive:
      rules:
        - name: exported
        - name: var-naming
        - name: error-return
        - name: error-strings
        - name: increment-decrement
        - name: unused-parameter

  exclusions:
    rules:
      - path: "_test\\.go"
        linters:
          - funlen
          - gocognit
          - gocyclo
          - cyclop
          - gochecknoglobals

      - path: "lsp/"
        linters:
          - gochecknoglobals

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
